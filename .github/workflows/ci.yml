name: CI

# Full quality gate (fmt + clippy + tests) on every PR and on main after merge.
# This is the heavy gate deliberately kept out of the local git hooks.
on:
  pull_request:
  push:
    branches: [main]

jobs:
  check:
    name: fmt + clippy + tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwayland-dev libxkbcommon-dev libasound2-dev libudev-dev libx11-dev \
            clang lld

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: app

      - name: Quality gate
        run: make check
